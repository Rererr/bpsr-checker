name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Download WinDivert
        shell: pwsh
        run: |
          $version = "2.2.2"
          $url = "https://github.com/basil00/Divert/releases/download/v${version}/WinDivert-${version}-A.zip"
          Invoke-WebRequest -Uri $url -OutFile WinDivert.zip
          Expand-Archive -Path WinDivert.zip -DestinationPath WinDivert-extract
          Copy-Item "WinDivert-extract/WinDivert-${version}-A/x64/WinDivert.dll" -Destination src-tauri/
          Copy-Item "WinDivert-extract/WinDivert-${version}-A/x64/WinDivert64.sys" -Destination src-tauri/

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "bpsr-checker ${{ github.ref_name }}"
          releaseBody: "DPSチェッカー ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
