syntax = "proto3";

package pb;

enum EDamageType {
  Normal = 0;
  Miss = 1;
  Heal = 2;
}

enum EEntityType {
  EntErrType = 0;
  EntMonster = 1;
  EntChar = 10;
}

message Attr {
  int32 id = 1;
  bytes raw_data = 2;
}

message AttrCollection {
  int64 uuid = 1;
  repeated Attr attrs = 2;
}

// AoiSyncDelta.effects(field 3) の各要素
// field 3 = duration_ms: 0/未設定=無期限、-1=永続、>0=ms単位の持続時間
message EffectInfo {
  int64 id = 1;
  int64 activated_at = 2;
  int64 duration_ms = 3;
  int64 flag = 4;
  int64 extra = 5;
}

// AoiSyncDelta.field_10 に入るバフイベントリスト
// buff_type ごとに detail 構造が異なるため、body/detail は bytes でラップして
// 必要な型のみ手動デコードする方針。
message AoiBuffDetail {
  // buff_type == 18 用の構造 (免疫デバフ等)
  int32 slot_id = 1;
  int64 buff_config_id = 2;
  int32 level = 3;
  int64 base_buff_id = 5;
  int64 apply_time = 6;
  int64 target_uuid = 7;
  int32 is_active = 8;
  int64 permanent_flag = 10;
  int64 duration_ms = 11;
}

message AoiBuffBody {
  int32 buff_type = 1;
  bytes detail_raw = 2;
}

message AoiBuff {
  int32 event_type = 1;
  int32 skill_slot = 2;
  int64 actor_uuid = 3;
  bytes body_raw = 5;
}

message AoiBuffList {
  repeated AoiBuff buffs = 2;
}

message AoiSyncDelta {
  int64 uuid = 1;
  AttrCollection attrs = 2;
  AoiBuffList buff_list = 10;
  SkillEffect skill_effects = 7;
}

message AoiSyncToMeDelta {
  AoiSyncDelta base_delta = 1;
  repeated EffectInfo effects = 3;
  int64 uuid = 5;
}

message CharBaseInfo {
  int64 char_id = 1;
  string account_id = 2;
  string name = 5;
  int32 fight_point = 35;
}

message CharSerialize {
  int64 char_id = 1;
  CharBaseInfo char_base = 2;
  SceneData scene_data = 3;
  ItemPackage item_package = 7;
  Mod mod = 57;
  ProfessionList profession_list = 61;
}

message DisappearEntity { int64 uuid = 1; }

message Entity {
  int64 uuid = 1;
  EEntityType ent_type = 2;
  AttrCollection attrs = 3;
}

message Item { ModNewAttr mod_new_attr = 13; }

message ItemPackage { map<int32, Package> packages = 1; }

message Mod { map<int64, ModInfo> mod_infos = 2; }

message ModInfo { repeated int32 init_link_nums = 4; }

message ModNewAttr { repeated int32 mod_parts = 1; }

message NotifySocialData { NotifySocialDataRequest v_request = 1; }

message NotifySocialDataRequest { SocialData data = 1; }

message Package { map<int64, Item> items = 4; }

message ProfessionList { int32 cur_profession_id = 1; }

message SceneData {
  uint32 level_map_id = 6;
  uint32 line_id = 15;
}

message SkillEffect { repeated SyncDamageInfo damages = 2; }

message SocialData { SceneData scene_data = 10; }

message SyncContainerData { CharSerialize v_data = 1; }

message SyncDamageInfo {
  bool is_miss = 2;
  EDamageType type = 4;
  int32 type_flag = 5;
  int64 value = 6;
  int64 lucky_value = 8;
  int64 hp_lessen_value = 9;
  int64 attacker_uuid = 11;
  int32 owner_id = 12;
  bool is_dead = 17;
  int64 top_summoner_id = 21;
}

message SyncNearDeltaInfo { repeated AoiSyncDelta delta_infos = 1; }

message SyncNearEntities {
  repeated Entity appear = 1;
  repeated DisappearEntity disappear = 2;
}

message SyncToMeDeltaInfo { AoiSyncToMeDelta delta_info = 1; }

message Vector3 {
  float x = 1;
  float y = 2;
  float z = 3;
}

message FightSourceInfo {
  int32 fight_source_type = 1;
  int32 source_config_id = 2;
}

message BuffInfo {
  int32 buff_uuid = 1;
  int32 base_id = 2;
  int32 level = 3;
  int64 host_uuid = 4;
  int32 table_uuid = 5;
  int64 create_time = 6;
  int64 fire_uuid = 7;
  int32 layer = 8;
  int32 part_id = 9;
  int32 count = 10;
  int32 duration = 11;
  FightSourceInfo fight_source_info = 12;
}

message BuffInfoSync {
  int64 uuid = 1;
  repeated BuffInfo buff_infos = 2;
}

message BuffChangeNotify {
  int64 host_uuid = 1;
  int32 buff_uuid = 2;
  int32 base_id = 3;
  int64 duration = 4;
  int64 create_time = 5;
  int32 layer = 6;
}
