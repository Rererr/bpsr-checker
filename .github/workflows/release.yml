name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write  # SignPath OIDC verification

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Download WinDivert
        shell: pwsh
        run: |
          $version = "2.2.2"
          $url = "https://github.com/basil00/Divert/releases/download/v${version}/WinDivert-${version}-A.zip"
          Invoke-WebRequest -Uri $url -OutFile WinDivert.zip
          Expand-Archive -Path WinDivert.zip -DestinationPath WinDivert-extract
          Copy-Item "WinDivert-extract/WinDivert-${version}-A/x64/WinDivert.dll" -Destination src-tauri/
          Copy-Item "WinDivert-extract/WinDivert-${version}-A/x64/WinDivert64.sys" -Destination src-tauri/

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare artifacts for signing
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force to-sign
          New-Item -ItemType Directory -Force signed
          Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe -ErrorAction SilentlyContinue |
            ForEach-Object { Copy-Item $_ to-sign/; Copy-Item $_ signed/ }
          Write-Host "Artifacts to sign:"
          Get-ChildItem to-sign/

      - name: Upload unsigned artifacts
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-build
          path: to-sign/

      - name: Sign with SignPath
        continue-on-error: true
        uses: signpath/github-action-submit-signing-request@v1.2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ secrets.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed/

      - name: Release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "bpsr-checker ${{ github.ref_name }}"
          body: "DPSチェッカー ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: signed/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
